<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Error — Augustus Corp</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#030913;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .code{font-size:clamp(6rem,18vw,12rem);font-weight:900;line-height:1;background:linear-gradient(135deg,#1A6EEB,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .label{font-size:.625rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:#E8A22A;margin-bottom:1.25rem;}
    h1{font-size:clamp(1.4rem,3vw,2rem);font-weight:700;margin-bottom:1rem;}
    p{color:rgba(255,255,255,.55);line-height:1.7;max-width:36rem;margin:0 auto 2.5rem;}
    .btn{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,#1A6EEB,#1458C0);color:#fff;font-weight:700;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;text-decoration:none;padding:1rem 2rem;box-shadow:0 4px 24px rgba(26,110,235,.5);}
    .btn:hover{opacity:.9;}
  </style>
</head>
<body>
  <div>
    <div class="code">500</div>
    <div class="label">Server Error</div>
    <h1>Something went wrong on our end</h1>
    <p>Our team has been notified and is working on a fix. Please try again in a few minutes.</p>
    <a href="/" class="btn">← Back to Home</a>
  </div>
</body>
</html>
